<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5a623"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="RaidCabs"/>
    <meta name="description" content="Raid Cabs — Our Wheels Take You To Fly" />
    <link rel="manifest" href="/manifest.json"/>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icon-192.png"/>
    <title>Raid Cabs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Kill ALL old service workers and caches, then register fresh
      if ('serviceWorker' in navigator) {
        // Clear all caches first
        if (window.caches) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)))
        }
        // Unregister all old SWs
        navigator.serviceWorker.getRegistrations().then(regs => {
          Promise.all(regs.map(r => r.unregister())).then(() => {
            navigator.serviceWorker.register('/sw.js')
              .then(() => console.log('[PWA] Service worker registered'))
              .catch(e => console.log('[PWA] SW failed:', e))
          })
        })
      }
    </script>
  </body>
</html>
