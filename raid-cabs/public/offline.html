<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RaidCabs — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#0a0a0f;color:#f0eefc;font-family:'Helvetica Neue',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
  h1{font-size:1.75rem;font-weight:800;color:#f5a623;margin:1rem 0 .5rem}
  p{color:#8b87b0;line-height:1.65;max-width:320px;margin-bottom:1.5rem}
  button{padding:.82rem 2rem;background:linear-gradient(135deg,#f5a623,#ff6b2b);color:#0a0a0f;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
  <div style="font-size:4rem">🚖</div>
  <h1>You're Offline</h1>
  <p>RaidCabs needs an internet connection to book rides. Please check your connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
